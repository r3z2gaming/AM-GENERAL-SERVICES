<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM General Services</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0B0B0B;
  color: #F5F5F5;
}

/* ===== CONTAINER ===== */
.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
}

/* ===== NAVBAR ===== */
.nav {
  padding: 20px 0;
  border-bottom: 1px solid #2A2A2A;
}

.nav h1 {
  margin: 0;
  font-size: 20px;
}

/* ===== HERO ===== */
.hero {
  padding: 100px 0;
}

.hero h2 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #A0A0A0;
}

/* ===== BUTTON ===== */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  border: 1px solid #F5F5F5;
  text-decoration: none;
  color: #F5F5F5;
}

/* ===== SECTION ===== */
.section {
  background: #1F1F1F;
  padding: 60px 20px;
  margin-top: 40px;
  border-radius: 10px;
}

.section h3 {
  margin-top: 0;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #0B0B0B;
  padding: 20px;
  border: 1px solid #2A2A2A;
  border-radius: 8px;
}

.card p {
  color: #A0A0A0;
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 60px;
  padding: 40px 0;
  border-top: 1px solid #2A2A2A;
  text-align: center;
  color: #A0A0A0;
}
</style>

</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="container">
    <h1>LOGO / NAME</h1>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="container">
    <h2>Main Headline Goes Here</h2>
    <p>Short description text goes here</p>
    <a href="#" class="btn">Call To Action</a>
  </div>
</div>

<!-- SERVICES -->
<div class="section">
  <div class="container">
    <h3>Services</h3>

    <div class="grid">
      <div class="card">
        <h4>Service</h4>
        <p>Description</p>
      </div>

      <div class="card">
        <h4>Service</h4>
        <p>Description</p>
      </div>

      <div class="card">
        <h4>Service</h4>
        <p>Description</p>
      </div>
    </div>
  </div>
</div>

<!-- REVIEWS -->
<div class="section">
  <div class="container">
    <h3>Reviews</h3>

    <div class="grid">
      <div class="card">
        <p>"Review text"</p>
      </div>

      <div class="card">
        <p>"Review text"</p>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="container">
    <p>Footer / Contact Info</p>
  </div>
</div>

</body>
</html>
